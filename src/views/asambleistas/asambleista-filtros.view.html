<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>
Buscador de Asambleistas
</title>

<style>

body{
font-family: Arial;
margin:20px;
}

h1{
margin-bottom:20px;
}

form{
display:flex;
gap:15px;
flex-wrap:wrap;
align-items:end;
margin-bottom:20px;
}

label{
font-weight:bold;
}

input,
button{
padding:8px;
}

table{
width:100%;
border-collapse: collapse;
margin-top:20px;
}

th, td{
border:1px solid black;
padding:10px;
text-align:left;
}

th{
background:#f2f2f2;
}

.vigente{
background:green;
color:white;
padding:5px;
border-radius:5px;
}

.inactivo{
background:red;
color:white;
padding:5px;
border-radius:5px;
}

</style>

</head>

<body>

<h1>
Buscador de Asambleistas
</h1>

<form id="formFiltros">

<div>

<label>
Buscar por nombre o cédula
</label>

<br>

<input
type="text"
id="busqueda"
name="busqueda"
list="asambleistas"
placeholder="Nombre o cédula">

<datalist id="asambleistas">

<option value="Asambleista Demo">
<option value="1-1111-1111">

</datalist>

</div>

<div>

<label>
Fecha Inicio
</label>

<br>

<input
type="date"
id="fecha_inicio"
name="fecha_inicio">

</div>

<div>

<label>
Fecha Fin
</label>

<br>

<input
type="date"
id="fecha_fin"
name="fecha_fin">

</div>

<div>

<button type="submit">
Consultar
</button>

</div>

</form>

<table>

<thead>

<tr>

<th>
Nombre
</th>

<th>
Cédula
</th>

<th>
Correo
</th>

<th>
Fecha Registro
</th>

<th>
Estado
</th>

</tr>

</thead>

<tbody id="tablaAsambleistas">

</tbody>

</table>

<script>

const formulario =
document.getElementById('formFiltros');

const tabla =
document.getElementById('tablaAsambleistas');

formulario.addEventListener(
'submit',
async function(event){

    event.preventDefault();

    const busqueda =
    document.getElementById('busqueda').value;

    const fechaInicio =
    document.getElementById('fecha_inicio').value;

    const fechaFin =
    document.getElementById('fecha_fin').value;

    if(
        fechaInicio &&
        fechaFin &&
        fechaInicio > fechaFin
    ){

        alert(
            'La fecha inicio no puede ser mayor a la fecha fin'
        );

        return;
    }

    try {

        const parametros =
        new URLSearchParams();
        if(busqueda){
            parametros.append(
            'busqueda',
        busqueda
    );
}
        if(fechaInicio){
            parametros.append(
             'fecha_inicio',
             fechaInicio
    );
}

        if(fechaFin){
            parametros.append(
                'fecha_fin',
                fechaFin
    );
}

        const respuesta =
        await fetch(
    `http://localhost:3000/asambleistas/buscar?${parametros.toString()}`
);

        const datos =
        await respuesta.json();
        console.log(datos);
        tabla.innerHTML = '';

        datos.forEach(function(asambleista){

            const estado =
            asambleista.estado
            ? '<span class="vigente">VIGENTE</span>'
            : '<span class="inactivo">INACTIVO</span>';

            tabla.innerHTML += `
                <tr>
                    <td>${asambleista.nombre_completo}</td>
                    <td>${asambleista.cedula}</td>
                    <td>${asambleista.correo}</td>
                    <td>${asambleista.fecha_registro}</td>
                    <td>${estado}</td>
                </tr>
            `;
        });

    } catch(error){

        console.error(error);

        alert(
            'Error al consultar asambleistas'
        );
    }
}
);

</script>

</body>

</html>
